name: toronto_ai_parking_agent
description: Toronto AI parking and daily assistant app starter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.2
  http: ^1.2.2
  geolocator: ^14.0.2
  flutter_tts: ^4.2.3
  speech_to_text: ^7.3.0
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  camera: ^0.11.1
  vibration: ^3.1.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/faithpark_logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/data/curated_verses.json
    - assets/images/faithpark_logo.png
